<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338CA" /> <!-- Indigo 700 -->
      <stop offset="100%" stop-color="#3B82F6" /> <!-- Blue 500 -->
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="6" dy="10" stdDeviation="8" flood-color="#1E1B4B" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- 배경 (투명하게 하려면 이 rect 태그를 삭제하세요) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGradient)" />
  
  <!-- 두껍고 비뚫어진 B 텍스트 -->
  <text 
    x="256" 
    y="385" 
    font-family="'Arial Black', 'Impact', system-ui, sans-serif" 
    font-size="360" 
    font-weight="900" 
    fill="#FFFFFF" 
    text-anchor="middle" 
    transform="rotate(-12, 256, 256) skewX(-10)" 
    filter="url(#drop-shadow)"
  >B</text>
</svg>